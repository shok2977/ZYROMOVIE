<!DOCTYPE html>
<html lang="en">
  
<head>
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#151515" />
    <meta name="author" content="ZyroMovies" />
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://zyromovie.onrender.com/" />
    <meta
        name="description"
        content="ZyroMovies: Watch movies, anime, and TV shows in your favorite languages with fast streaming."
    />
    <meta
        name="keywords"
        content="movies, anime, tv shows, streaming, Fluid Player, ZyroMovies"
    />
    <meta property="og:site_name" content="ZyroMovies" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="ZyroMovies - Movies, Anime and TV Shows" />
    <meta
        property="og:description"
        content="Watch movies, anime, and TV shows online with a smooth and fast streaming experience."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zyromovie.onrender.com/" />
    <meta property="og:image" content="https://zyromovie.onrender.com/img/1.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZyroMovies - Movies, Anime and TV Shows" />
    <meta name="twitter:description" content="Watch movies, anime, and TV shows online with fast streaming." />
    <meta name="twitter:image" content="https://zyromovie.onrender.com/img/1.jpeg" />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Sen:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <title>ZyroMovies - Watch Movies, Anime and TV Shows Online</title>
   
</head>

<body>
   
      

    <div class="navbar">
        <div class="navbar-container">
            <div class="logo-container">
                <h1 class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">
                    ZyroMovies
                  </a>
            </div>
            <div class="search-container">
                <input
                    type="text"
                    id="search-input"
                     class="search-input"
                    placeholder="Search movies, anime, shows..."
                    autocomplete="off"
                /> 
                <button id="search-button" class="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="content-container">
            <div id="banner-slider-root" class="banner-slider-root" style="display: none;"></div>
            <div id="search-results-container" class="movie-list-container" style="display: none;">
                <h1 class="movie-list-title">SEARCH RESULTS</h1>
                <div class="movie-list-wrapper">
                    <div id="search-results" class="movie-list">
                    </div>
                </div>
            </div>
            <div id="dynamic-lists-root"></div>
     </div>
    <script src="app.js"></script>
</body>

</html>
