<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#151515" />
    <meta name="description" content="Watch your selected title on Zyro Movie (Zyro Movies) with smooth playback and episode navigation." />
    <link rel="canonical" href="https://zyromovie.onrender.com/player.html" />
    <meta property="og:site_name" content="ZyroMovies" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="video.other" />
    <meta property="og:title" content="Watch Online | Zyro Movie" />
    <meta property="og:description" content="Stream your selected movie, anime or TV episode on Zyro Movie (Zyro Movies)." />
    <meta property="og:url" content="https://zyromovie.onrender.com/player.html" />
    <meta property="og:image" content="https://zyromovie.onrender.com/img/1.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Watch Online | Zyro Movie" />
    <meta name="twitter:description" content="Stream your selected movie, anime or TV episode on Zyro Movie." />
    <meta name="twitter:image" content="https://zyromovie.onrender.com/img/1.jpeg" />
    <title>Watch Online | Zyro Movie</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Sen:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
    />
    <!-- Google IMA SDK must load before Video.js / videojs-ima -->
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/video.js@8/dist/video-js.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/video.js@8/dist/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads@7/dist/videojs.ads.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/videojs-ima@2/dist/videojs.ima.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/videojs-ima@2/dist/videojs.ima.min.js"></script>
    <style>
      #player-box video,
      #player-box iframe {
        width: 100%;
        height: 500px;
        border: 0;
      }
      /* Video.js + IMA: fill player area (linear + many VPAID creatives) */
      #player-box .video-js {
        width: 100% !important;
        height: 500px !important;
      }
      #player-box .vjs-tech {
        width: 100% !important;
        height: 500px !important;
        object-fit: contain;
      }
      #player-box .ima-ad-container,
      #player-box .ima-ad-container iframe {
        max-width: 100% !important;
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Watch Online | ZyroMovies",
        "url": "https://zyromovie.onrender.com/player.html",
        "isPartOf": {
          "@type": "WebSite",
          "name": "ZyroMovies",
          "url": "https://zyromovie.onrender.com/"
        }
      }
    </script>
  </head>
  <body class="player-body">
 
    
    <div class="navbar">
      <div class="navbar-container">
        <div class="logo-container">
          <a href="index.html" style="text-decoration: none; color: rgb(0, 0, 0);">
          <h1 class="logo">ZyroMovies</h1></a>
        </div>
        <div class="menu-container">
          <ul class="menu-list">
            <li class="menu-list-item active">Now Playing</li>
          </ul>
        </div>
        <div class="search-container">
          <a href="index.html" class="admin-link">Back to Home</a>
        </div>
      </div>
    </div>

    <div class="container player-container">
      <div class="player-content">
        <div class="player-meta">
          <h1 id="player-title" class="player-title">Loading...</h1>
          <p id="player-overview" class="player-overview"></p>
        </div>
        <div id="player-languages" class="player-languages"></div>
        <div id="player-episodes" class="player-episodes"></div>
        <div id="player-box" class="player-embed-wrapper">
          <video
            id="ad-player"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            playsinline
            width="100%"
            height="500"
          ></video>
        </div>
        <div class="player-audio-boost-wrapper" style="margin-top: 16px; text-align: center;">
        
        </div>
      </div>
    </div>
    

    <script src="player.js"></script>
  </body>
</html>
